services:

  redis:
    image: redis:7-alpine
    container_name: qilin_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: qilin_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: qilin
      POSTGRES_USER: ${DB_USER:-qilin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  ingestor-adsb:
    build: ./services/ingestor_adsb
    container_name: qilin_ingestor_adsb
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DB_URL: postgresql://${DB_USER:-qilin}:${DB_PASSWORD:-changeme}@timescaledb:5432/qilin
      POLL_INTERVAL: ${ADSB_POLL_INTERVAL:-5}
    volumes:
      - ./config:/app/config
    depends_on:
      - redis
      - timescaledb

  ingestor-vip:
    build: ./services/ingestor_vip
    container_name: qilin_ingestor_vip
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DB_URL: postgresql://${DB_USER:-qilin}:${DB_PASSWORD:-changeme}@timescaledb:5432/qilin
      VIP_POLL_INTERVAL: ${VIP_POLL_INTERVAL:-60}
    volumes:
      - ./config:/app/config
    depends_on:
      - redis
      - timescaledb

  rsshub:
    image: diygod/rsshub:latest
    container_name: qilin_rsshub
    restart: unless-stopped
    environment:
      NODE_ENV: production
      CACHE_TYPE: redis
      REDIS_URL: redis://redis:6379/1
      DISALLOW_ROBOT: "1"
      # Para feeds de Twitter/X: pega los cookies de una sesión activa de X
      # Instrucciones: https://docs.rsshub.app/deploy/config#twitter
      TWITTER_AUTH_TOKEN: ${TWITTER_AUTH_TOKEN:-}
      TWITTER_CSRF_TOKEN: ${TWITTER_CSRF_TOKEN:-}
    depends_on:
      - redis

  ingestor-social:
    build: ./services/ingestor_social
    container_name: qilin_ingestor_social
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DB_URL: postgresql://${DB_USER:-qilin}:${DB_PASSWORD:-changeme}@timescaledb:5432/qilin
      SOCIAL_POLL_INTERVAL: ${SOCIAL_POLL_INTERVAL:-900}
      RSSHUB_BASE: ${RSSHUB_BASE:-https://rsshub.app}
      SOCIAL_BATCH_SIZE: ${SOCIAL_BATCH_SIZE:-15}
    volumes:
      - ./config:/app/config
    depends_on:
      - redis
      - timescaledb

  ingestor-news:
    build: ./services/ingestor_news
    container_name: qilin_ingestor_news
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DB_URL: postgresql://${DB_USER:-qilin}:${DB_PASSWORD:-changeme}@timescaledb:5432/qilin
      NEWS_POLL_INTERVAL: ${NEWS_POLL_INTERVAL:-900}
    volumes:
      - ./config:/app/config
    depends_on:
      - redis
      - timescaledb

  ingestor-docs:
    build: ./services/ingestor_docs
    container_name: qilin_ingestor_docs
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DB_URL: postgresql://${DB_USER:-qilin}:${DB_PASSWORD:-changeme}@timescaledb:5432/qilin
      DOCS_POLL_INTERVAL: ${DOCS_POLL_INTERVAL:-3600}
    volumes:
      - ./config:/app/config
    depends_on:
      - redis
      - timescaledb

  ingestor-sec:
    build: ./services/ingestor_sec
    container_name: qilin_ingestor_sec
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DB_URL: postgresql://${DB_USER:-qilin}:${DB_PASSWORD:-changeme}@timescaledb:5432/qilin
      SEC_POLL_INTERVAL: ${SEC_POLL_INTERVAL:-1800}
    volumes:
      - ./config:/app/config
    depends_on:
      - redis
      - timescaledb

  ingestor-ais:
    build: ./services/ingestor_ais
    container_name: qilin_ingestor_ais
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DB_URL: postgresql://${DB_USER:-qilin}:${DB_PASSWORD:-changeme}@timescaledb:5432/qilin
      AISSTREAM_API_KEY: ${AISSTREAM_API_KEY:-}
    volumes:
      - ./config:/app/config
    depends_on:
      - redis
      - timescaledb

  ingestor-bases:
    build: ./services/ingestor_bases
    container_name: qilin_ingestor_bases
    restart: unless-stopped
    environment:
      DB_URL: postgresql://${DB_USER:-qilin}:${DB_PASSWORD:-changeme}@timescaledb:5432/qilin
      BASES_POLL_INTERVAL: ${BASES_POLL_INTERVAL:-300}
    depends_on:
      - timescaledb

  ingestor-sentinel:
    build: ./services/ingestor_sentinel
    container_name: qilin_ingestor_sentinel
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DB_URL: postgresql://${DB_USER:-qilin}:${DB_PASSWORD:-changeme}@timescaledb:5432/qilin
      CDSE_USER: ${CDSE_USER:-}
      CDSE_PASSWORD: ${CDSE_PASSWORD:-}
      SENTINEL_POLL_INTERVAL: ${SENTINEL_POLL_INTERVAL:-21600}
    volumes:
      - ./config:/app/config
    depends_on:
      - redis
      - timescaledb

  alert-engine:
    build: ./services/alert_engine
    container_name: qilin_alert_engine
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DB_URL: postgresql://${DB_USER:-qilin}:${DB_PASSWORD:-changeme}@timescaledb:5432/qilin
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./config:/app/config
    depends_on:
      - redis
      - timescaledb

  agent-engine:
    build: ./services/agent_engine
    container_name: qilin_agent_engine
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DB_URL: postgresql://${DB_USER:-qilin}:${DB_PASSWORD:-changeme}@timescaledb:5432/qilin
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AGENT_TIMEOUT_SECONDS: ${AGENT_TIMEOUT_SECONDS:-45}
      MAX_ANALYSES_PER_HOUR: ${MAX_ANALYSES_PER_HOUR:-10}
      MAX_PARALLEL_ANALYSES: ${MAX_PARALLEL_ANALYSES:-3}
    volumes:
      - ./config:/app/config
    depends_on:
      - redis
      - timescaledb

  ingestor-polymarket:
    build: ./services/ingestor_polymarket
    container_name: qilin_ingestor_polymarket
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DB_URL: postgresql://${DB_USER:-qilin}:${DB_PASSWORD:-changeme}@timescaledb:5432/qilin
      POLYMARKET_POLL_INTERVAL: ${POLYMARKET_POLL_INTERVAL:-300}
      POLYMARKET_MIN_VOLUME: ${POLYMARKET_MIN_VOLUME:-1000}
    depends_on:
      - redis
      - timescaledb

  ingestor-market:
    build: ./services/ingestor_market
    container_name: qilin_ingestor_market
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DB_URL: postgresql://${DB_USER:-qilin}:${DB_PASSWORD:-changeme}@timescaledb:5432/qilin
      MARKET_POLL_INTERVAL: ${MARKET_POLL_INTERVAL:-900}
      MARKET_POLL_INTERVAL_OFFHOURS: ${MARKET_POLL_INTERVAL_OFFHOURS:-3600}
      MARKET_HISTORY_DAYS: ${MARKET_HISTORY_DAYS:-60}
    volumes:
      - ./config:/app/config
    depends_on:
      - redis
      - timescaledb

  report-engine:
    build: ./services/report_engine
    container_name: qilin_report_engine
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DB_URL: postgresql://${DB_USER:-qilin}:${DB_PASSWORD:-changeme}@timescaledb:5432/qilin
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      REPORT_RECIPIENTS: ${REPORT_RECIPIENTS:-}
      DAILY_REPORT_HOUR: ${DAILY_REPORT_HOUR:-7}
      WEEKLY_REPORT_DAY: ${WEEKLY_REPORT_DAY:-mon}
    volumes:
      - ./config:/app/config
      - ./reports:/app/reports
    depends_on:
      - redis
      - timescaledb

  api:
    build: ./services/api
    container_name: qilin_api
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DB_URL: postgresql://${DB_USER:-qilin}:${DB_PASSWORD:-changeme}@timescaledb:5432/qilin
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      AUTH_USER_1: ${AUTH_USER_1:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config
      - ./reports:/app/reports
    depends_on:
      - redis
      - timescaledb

volumes:
  redis_data:
  timescale_data:
