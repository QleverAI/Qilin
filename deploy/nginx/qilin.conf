server {
    listen 80;
    server_name 178.104.238.122;

    root /opt/qilin/frontend/dist;
    index index.html;

    # ── gzip (capa 1 de cache) ────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/json text/css application/javascript text/plain;
    gzip_comp_level 5;
    gzip_proxied any;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets con hash en el nombre: cache 1 año immutable
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Override específico: MIME correcto para el manifest PWA
    # (no tocamos `types {}` a nivel server para no romper los MIME heredados)
    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }

    location /api/ {
        proxy_pass http://localhost:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /auth/ {
        proxy_pass http://localhost:8000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws {
        proxy_pass http://localhost:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
}
